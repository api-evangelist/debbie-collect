naftiko: 1.0.0-alpha2
info:
  label: Debbie Client API — Cases
  description: 'Debbie Client API — Cases. 2 operations. Lead operation: Create a case. Self-contained Naftiko capability
    covering one Debbie Collect business surface.'
  tags:
  - Debbie Collect
  - Cases
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DEBBIE_COLLECT_API_KEY: DEBBIE_COLLECT_API_KEY
capability:
  consumes:
  - type: http
    namespace: debbie-client-cases
    baseUri: https://creditor.debbie.dk/api
    description: Debbie Client API — Cases business capability. Self-contained, no shared references.
    resources:
    - name: cases
      path: /cases
      operations:
      - name: createcase
        method: POST
        description: Create a case
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: cases-caseId
      path: /cases/{caseId}
      operations:
      - name: getcase
        method: GET
        description: Get a case
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: caseId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.DEBBIE_COLLECT_API_KEY}}'
  exposes:
  - type: rest
    namespace: debbie-client-cases-rest
    port: 8080
    description: REST adapter for Debbie Client API — Cases. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/cases
      name: cases
      description: REST surface for cases.
      operations:
      - method: POST
        name: createcase
        description: Create a case
        call: debbie-client-cases.createcase
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/cases/{caseid}
      name: cases-caseid
      description: REST surface for cases-caseId.
      operations:
      - method: GET
        name: getcase
        description: Get a case
        call: debbie-client-cases.getcase
        with:
          caseId: rest.caseId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: debbie-client-cases-mcp
    port: 9090
    transport: http
    description: MCP adapter for Debbie Client API — Cases. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-case
      description: Create a case
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: debbie-client-cases.createcase
      outputParameters:
      - type: object
        mapping: $.
    - name: get-case
      description: Get a case
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: debbie-client-cases.getcase
      with:
        caseId: tools.caseId
      outputParameters:
      - type: object
        mapping: $.
