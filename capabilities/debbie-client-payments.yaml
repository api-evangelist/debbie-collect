naftiko: 1.0.0-alpha2
info:
  label: Debbie Client API — Payments
  description: 'Debbie Client API — Payments. 1 operations. Lead operation: Submit payment information. Self-contained Naftiko
    capability covering one Debbie Collect business surface.'
  tags:
  - Debbie Collect
  - Payments
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DEBBIE_COLLECT_API_KEY: DEBBIE_COLLECT_API_KEY
capability:
  consumes:
  - type: http
    namespace: debbie-client-payments
    baseUri: https://creditor.debbie.dk/api
    description: Debbie Client API — Payments business capability. Self-contained, no shared references.
    resources:
    - name: cases-caseId-payments
      path: /cases/{caseId}/payments
      operations:
      - name: submitpayment
        method: POST
        description: Submit payment information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: caseId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.DEBBIE_COLLECT_API_KEY}}'
  exposes:
  - type: rest
    namespace: debbie-client-payments-rest
    port: 8080
    description: REST adapter for Debbie Client API — Payments. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/cases/{caseid}/payments
      name: cases-caseid-payments
      description: REST surface for cases-caseId-payments.
      operations:
      - method: POST
        name: submitpayment
        description: Submit payment information
        call: debbie-client-payments.submitpayment
        with:
          caseId: rest.caseId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: debbie-client-payments-mcp
    port: 9090
    transport: http
    description: MCP adapter for Debbie Client API — Payments. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: submit-payment-information
      description: Submit payment information
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: debbie-client-payments.submitpayment
      with:
        caseId: tools.caseId
      outputParameters:
      - type: object
        mapping: $.
