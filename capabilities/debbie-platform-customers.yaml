naftiko: 1.0.0-alpha2
info:
  label: Debbie Platform API — Customers
  description: 'Debbie Platform API — Customers. 3 operations. Lead operation: Create a customer (debtor). Self-contained
    Naftiko capability covering one Debbie Collect business surface.'
  tags:
  - Debbie Collect
  - Customers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DEBBIE_COLLECT_API_KEY: DEBBIE_COLLECT_API_KEY
capability:
  consumes:
  - type: http
    namespace: debbie-platform-customers
    baseUri: https://api.debbie.dk
    description: Debbie Platform API — Customers business capability. Self-contained, no shared references.
    resources:
    - name: customers
      path: /customers
      operations:
      - name: createcustomer
        method: POST
        description: Create a customer (debtor)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: customers-customerId
      path: /customers/{customerId}
      operations:
      - name: getcustomer
        method: GET
        description: Get a customer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: customerId
          in: path
          type: string
          required: true
      - name: patchcustomer
        method: PATCH
        description: Update a customer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: customerId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.DEBBIE_COLLECT_API_KEY}}'
  exposes:
  - type: rest
    namespace: debbie-platform-customers-rest
    port: 8080
    description: REST adapter for Debbie Platform API — Customers. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/customers
      name: customers
      description: REST surface for customers.
      operations:
      - method: POST
        name: createcustomer
        description: Create a customer (debtor)
        call: debbie-platform-customers.createcustomer
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/customers/{customerid}
      name: customers-customerid
      description: REST surface for customers-customerId.
      operations:
      - method: GET
        name: getcustomer
        description: Get a customer
        call: debbie-platform-customers.getcustomer
        with:
          customerId: rest.customerId
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: patchcustomer
        description: Update a customer
        call: debbie-platform-customers.patchcustomer
        with:
          customerId: rest.customerId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: debbie-platform-customers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Debbie Platform API — Customers. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: create-customer-debtor
      description: Create a customer (debtor)
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: debbie-platform-customers.createcustomer
      outputParameters:
      - type: object
        mapping: $.
    - name: get-customer
      description: Get a customer
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: debbie-platform-customers.getcustomer
      with:
        customerId: tools.customerId
      outputParameters:
      - type: object
        mapping: $.
    - name: update-customer
      description: Update a customer
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: debbie-platform-customers.patchcustomer
      with:
        customerId: tools.customerId
      outputParameters:
      - type: object
        mapping: $.
