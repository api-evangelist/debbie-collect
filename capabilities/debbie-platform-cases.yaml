naftiko: 1.0.0-alpha2
info:
  label: Debbie Platform API — Cases
  description: 'Debbie Platform API — Cases. 4 operations. Lead operation: List cases. Self-contained Naftiko capability covering
    one Debbie Collect business surface.'
  tags:
  - Debbie Collect
  - Cases
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DEBBIE_COLLECT_API_KEY: DEBBIE_COLLECT_API_KEY
capability:
  consumes:
  - type: http
    namespace: debbie-platform-cases
    baseUri: https://api.debbie.dk
    description: Debbie Platform API — Cases business capability. Self-contained, no shared references.
    resources:
    - name: cases
      path: /cases
      operations:
      - name: listcases
        method: GET
        description: List cases
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createcase
        method: POST
        description: Create a case
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: cases-caseId
      path: /cases/{caseId}
      operations:
      - name: getcase
        method: GET
        description: Get a case
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: caseId
          in: path
          type: string
          required: true
      - name: patchcase
        method: PATCH
        description: Update a case
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: caseId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.DEBBIE_COLLECT_API_KEY}}'
  exposes:
  - type: rest
    namespace: debbie-platform-cases-rest
    port: 8080
    description: REST adapter for Debbie Platform API — Cases. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/cases
      name: cases
      description: REST surface for cases.
      operations:
      - method: GET
        name: listcases
        description: List cases
        call: debbie-platform-cases.listcases
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcase
        description: Create a case
        call: debbie-platform-cases.createcase
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/cases/{caseid}
      name: cases-caseid
      description: REST surface for cases-caseId.
      operations:
      - method: GET
        name: getcase
        description: Get a case
        call: debbie-platform-cases.getcase
        with:
          caseId: rest.caseId
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: patchcase
        description: Update a case
        call: debbie-platform-cases.patchcase
        with:
          caseId: rest.caseId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: debbie-platform-cases-mcp
    port: 9090
    transport: http
    description: MCP adapter for Debbie Platform API — Cases. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-cases
      description: List cases
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: debbie-platform-cases.listcases
      outputParameters:
      - type: object
        mapping: $.
    - name: create-case
      description: Create a case
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: debbie-platform-cases.createcase
      outputParameters:
      - type: object
        mapping: $.
    - name: get-case
      description: Get a case
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: debbie-platform-cases.getcase
      with:
        caseId: tools.caseId
      outputParameters:
      - type: object
        mapping: $.
    - name: update-case
      description: Update a case
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: debbie-platform-cases.patchcase
      with:
        caseId: tools.caseId
      outputParameters:
      - type: object
        mapping: $.
