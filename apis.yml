- aid: debbie-collect:debbie-platform-api
  name: Debbie Platform API
  description: The Debbie Platform API exposes resources for cases, creditors, customers, vouchers, files, updates, billing,
    and webhooks. It is used by collection agencies and other operators integrating Debbie into their core systems.
  humanURL: https://documentation.debbiecollect.com
  baseURL: https://api.debbie.dk
