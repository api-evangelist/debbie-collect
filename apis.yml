description: Debbie (Debbie Collect, operated by Intellitech Systems A/S) is an AI-driven SaaS platform that automates debt
  collection and accounts receivable management. Companies, collection agencies, and law firms use Debbie to run digital reminder
  flows, debtor dialogue, payment plans, and case management. Debbie publishes two RESTful APIs - a Platform API for collectors
  integrating Debbie into existing systems, and a Client API for creditors creating cases and exchanging payment data.
