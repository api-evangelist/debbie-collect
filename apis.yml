- aid: debbie-collect:debbie-client-api
  name: Debbie Client API
  description: The Debbie Client API allows creditors to create collection cases, exchange payment data, and receive case
    status updates. It is the primary integration surface for ERP/billing systems pushing overdue invoices into Debbie.
